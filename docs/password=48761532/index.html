  <link rel="stylesheet" href="../assets/css/style.css" />

  <style>
    /* 迷雾页兜底样式：避免 GitHub Pages 或缓存没有读到最新 CSS 时，黑雾失效 */
    .fog-card.force-fog {
      margin-top: 20px !important;
      padding: 24px !important;
      border-radius: 18px !important;
      background: #030303 !important;
      border: 1px solid rgba(246, 210, 122, 0.18) !important;
      box-shadow: inset 0 0 42px rgba(0, 0, 0, 0.82) !important;
    }

    .fog-card.force-fog .fog-reveal {
      color: #030303 !important;
      -webkit-text-fill-color: #030303 !important;
      background: #030303 !important;
      text-shadow: none !important;
      font-size: clamp(18px, 2.4vw, 24px) !important;
      line-height: 2.1 !important;
      letter-spacing: 0.06em !important;
      text-align: center !important;
      user-select: text !important;
      -webkit-user-select: text !important;
      cursor: text !important;
    }

    .fog-card.force-fog .fog-reveal::selection {
      color: #fff4d8 !important;
      -webkit-text-fill-color: #fff4d8 !important;
      background: rgba(185, 138, 59, 0.92) !important;
    }

    .fog-card.force-fog .fog-reveal::-moz-selection {
      color: #fff4d8 !important;
      background: rgba(185, 138, 59, 0.92) !important;
    }
  </style>

</head>

        </div>
      </div>
