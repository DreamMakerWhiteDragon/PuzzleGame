<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>第一劫：技能回响</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <main class="page">
    <span class="badge">第一劫 · 技能回响</span>
    <h1>残卷初启</h1>
    <p>妖雾遮住了天书上的文字，只留下一段来自战场深处的回响。</p>

    <div class="scroll-box">
      <h2>听音辨真言</h2>
      <p>请听下方音频，找出其中隐藏的数字顺序。得到真言后，将当前网址尾缀中的 <span class="url-hint">password=?</span> 改为：</p>
      <p><span class="url-hint">password=你得到的数字</span></p>

      <div class="audio-card">
        <p>封印音频：</p>
        <audio controls preload="metadata">
          <source src="../assets/audio/puzzle1.mp3" type="audio/mpeg" />
          你的浏览器不支持音频播放。请确认音频文件已放入 assets/audio/puzzle1.mp3。
        </audio>
      </div>
    </div>

    <p class="small">提示：输错真言会迷失在妖雾中。</p>
  </main>
</body>
</html>
