  <main class="page">
    <span class="badge">第二卷 · 八影归位</span>
    <h1>八影入卷</h1>
    <p>你写下第一道尾缀后，天书第二卷终于展开。八道身影掠过卷面，没有直呼其名，只把身份藏进诗句之中。</p>

    <div class="scroll-box">
      <h2>谜面</h2>
      <div class="clue-card poem">
        月照灌江三眼开，狐灯一点入云来。<br>
        白马驮经过石径，流沙抱杖立苍苔。<br>
        金猴踏雾惊天阙，九齿分云下翠崖。<br>
        碧海短匕掠水过，禅衣向晚渡尘埃。
      </div>

      <p>得到真言后，将当前网址尾缀中的 <span class="url-hint">password=</span> 改为：</p>
      <p><span class="url-hint">password=你得到的八位数</span></p>
    </div>

    <p class="small">提示：诗句顺序就是取数顺序。</p>
  </main>
